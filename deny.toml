[advisories]
version = 2
ignore = [
    # Transitive deps of deno_core/v8 — we can't upgrade these directly.
    "RUSTSEC-2025-0141", # bincode unmaintained
    "RUSTSEC-2024-0436", # paste unmaintained
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
